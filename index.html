<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manipulator Insight</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

</head>

<script src="js/audio.js"></script>
  
<body>

<div id="loading">

    <div class="logo">
        🎭
    </div>

    <h2 class="loader-text">
        INITIALIZING SYSTEM...
    </h2>

    <div class="loading-bar">

        <div id="loading-progress"></div>

    </div>

    <p id="loading-status">
        Starting...
    </p>

</div>
  
<!-- MATRIX BACKGROUND -->

<canvas id="matrix"></canvas>

<!-- DARK OVERLAY -->

<div class="overlay"></div>

<!-- MAIN CARD -->

<div class="container"<button id="musicBtn" onclick="toggleMusic()">
🔇 MUSIC OFF
</button>


<input 
type="range"
min="0"
max="1"
step="0.01"
value="0.35"
oninput="changeVolume(this.value)"
>>  

<!-- ===========================
QUESTION PAGE
============================ -->

<div id="quizPage" class="hidden">

<div class="quizCard">

<div class="progressBox">

<div id="progress"></div>

</div>

<h2 id="questionNumber">

Soal 1 / 50

</h2>

<h3 id="questionText">

Pertanyaan

</h3>

<div id="answers">

</div>

<div class="navButton">

<button onclick="prevQuestion()">

⬅ Kembali

</button>

<button onclick="nextQuestion()">

Lanjut ➜

</button>

</div>

</div>

</div>

<h1>

🎭

<br>

MANIPULATOR INSIGHT

</h1>

<p class="subtitle">

Behavioral Analysis System

</p>

<div class="card">

<label>

Nama Orang Yang Dinilai

</label>

<input

type="text"

id="nama"

placeholder="Masukkan Nama">

<label>

Umur (Opsional)

</label>

<input

type="number"

id="umur"

placeholder="Contoh : 20">

<label>

Jenis Kelamin

</label>

<select id="gender">

<option>Laki-laki</option>

<option>Perempuan</option>

<option>Tidak ingin menjawab</option>

</select>

<button onclick="mulaiTes()">

▶ MULAI ANALISIS

</button>

</div>

<div class="music">

<button id="musicBtn">

🔊 Music

</button>

</div>

<p class="warning">

Hasil hanya berupa indikator pola perilaku,

bukan diagnosis psikologis.

</p>

</div>

<script src="questions.js"></script>

<script src="script.js"></script>

</body>

</html>
